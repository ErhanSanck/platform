    <style>
        /* ============================================================
           İLETİŞİM SAYFASI — GÖRSEL ZENGİNLEŞTİRME
           ============================================================ */

        /* İki sütunlu kart düzeni */
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        /* Bilgi kartları */
        .contact-card {
            background: #ffffff;
            border-radius: 10px;
            padding: 14px 16px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
            border: 1px solid #e8edf5;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }

        .contact-card:hover {
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.11);
            transform: translateY(-1px);
        }

        .contact-card-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        .contact-card-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            margin-bottom: 1px;
        }

        .contact-card-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--dark-color);
            line-height: 1.5;
        }

        .contact-card-value a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .contact-card-value a:hover {
            text-decoration: underline;
        }

        /* Çalışma saatleri */
        .hours-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #f3f4f6;
            font-size: 12px;
        }

        .hours-row:last-child { border-bottom: none; }

        .hours-day { color: #4b5563; font-weight: 500; }

        .hours-time {
            font-weight: 600;
            color: var(--primary-color);
        }

        .hours-closed {
            font-weight: 600;
            color: #9ca3af;
        }

        /* Harita kartı */
        .maps-card {
            background: #ffffff;
            border-radius: 10px;
            padding: 14px 16px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
            border: 1px solid #e8edf5;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        .maps-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }

        .maps-card h2 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .maps-card p {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .maps-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff !important;
            padding: 12px 22px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            transition: all 0.2s ease;
        }

        .maps-link-btn:hover {
            background: linear-gradient(135deg, #1d4ed8, #1e3a8a);
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.4);
            transform: translateY(-1px);
        }

        /* Hızlı başvuru kartı */
        .cta-card {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            border: 1.5px solid #bae6fd;
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .cta-card-icon {
            font-size: 28px;
            flex-shrink: 0;
        }

        .cta-card-text h2 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 2px;
        }

        .cta-card-text p {
            font-size: 13px;
            color: #374151;
            margin-bottom: 10px;

        .cta-btn {

            align-items: center;
            gap: 6px;

            color: #ffffff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;

    <script>
    function handleInstagramLink(e) {
        // Derin link protokolü ile uygulamayı açmayı dener
        var appUrl = "instagram://user?username=dersplatformu";
        var webUrl = "https://instagram.com/dogrucevapnilufer";
        
        var start = Date.now();
        window.location.href = appUrl;
        
        // Eğer cihazda uygulama yoksa veya açılmazsa 500ms sonra web tarayıcısına yönlendirir
        setTimeout(function() {
            if (Date.now() - start < 1000) {
                window.open(webUrl, '_blank');
            }
        }, 500);
        
        e.preventDefault();
    }
    </script>
